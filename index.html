<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div class="sidebar">
        <ul>
            <li>
                <img src="images/view-dashboard.svg" alt="dashboard icon" width="50">
                <h2>Dashboard</h2>
            </li>
        </ul>
        <ul>
            <li>
                <img src="images/home.svg" alt="home icon" width="25">
                <a href="#">Home</a>
            </li>
            <li>
                <img src="images/card-account-details-outline.svg" alt="profile icon" width="25">
                <a href="#">Profile</a>
            </li>
            <li>
                <img src="images/message.svg" alt="messages icon" width="25">
                <a href="#">Messages</a>
            </li>
            <li>
                <img src="images/clock-time-three.svg" alt="history icon" width="25">
                <a href="#">History</a>
            </li>
            <li>
                <img src="images/file-multiple.svg" alt="tasks icon" width="25">
                <a href="#">Tasks</a>
            </li>
            <li>
                <img src="images/account-group.svg" alt="communities icon" width="25">
                <a href="#">Communities</a>
            </li>
        </ul>
        <ul>
            <li>
                <img src="images/cog.svg" alt="settings icon" width="25">
                <a href="#">Settings</a>
            </li>
            <li>
                <img src="images/help-box.svg" alt="support icon" width="25">
                <a href="#">Support</a>
            </li>
            <li>
                <img src="images/shield-check.svg" alt="privacy icon" width="25">
                <a href="#">Privacy</a>
            </li>
        </ul>
    </div>
    <div class="header">
        <div class="header-row strech" >
            <img src="images/magnify.svg" alt="magnifying glass" width="25">
            <input type="text">
        </div>
        <div class="header-row end">
            <img src="images/bell-ring-outline.svg" alt="a bell ringing" width="25">
            <img src="images/face-man-profile.svg" alt="a profile icon" width="50">
            <h4>Morgan Oakley</h4>
        </div>
        <div class="header-row">
            <img src="images/face-man-profile.svg" alt="a profile icon" width="75">
            <div class="account-name">
                <p>Hi there,</p>
                <h1>Morgan Oakley (morgan)</h1>
            </div>
        </div>
        <div class="header-row end">
            <button>New</button>
            <button>Upload</button>
            <button>Share</button>
        </div>
    </div>
    <div class="main-content">
        <h3>Your Projects</h3>
    </div>
</body>
</html>
